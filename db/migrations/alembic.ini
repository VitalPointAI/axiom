# Alembic configuration for Axiom/NearTax
# The sqlalchemy.url is overridden in env.py via DATABASE_URL environment variable.

[alembic]
# Path to migration scripts, relative to this file's location
script_location = .

# Disable the url here — env.py reads it from DATABASE_URL env var
# sqlalchemy.url = (set via environment variable in env.py)

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for the --%% Create Date comment in migration files
timezone = UTC

# Log configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
