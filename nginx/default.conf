upstream web {
    server web:3000;
}

upstream api {
    server api:8000;
}

upstream auth {
    server auth-service:3100;
}

server {
    listen 80;

    # Auth API routes → Express auth service (near-phantom-auth)
    # Uses regex to only match /auth/{something} (e.g. /auth/session, /auth/login/start)
    # Bare /auth or /auth/ falls through to Next.js (the login page)
    location ~ ^/auth/.+ {
        proxy_pass http://auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
