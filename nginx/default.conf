server {
    listen 80;

    # API runs with network_mode: host for fast external HTTP (neardata.xyz).
    # Web upstream resolves via Docker DNS; API is on the host at port 8000.
    resolver 127.0.0.11 valid=5s;

    set $api_upstream http://172.28.0.1:8000;
    set $web_upstream http://web:3000;

    # Auth API routes → FastAPI backend
    location ~ ^/auth/.+ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Phase 16 (D-27, T-16-10): /internal/crypto/* is restricted to loopback +
    # Docker bridge network. Public internet access is denied.
    # access_log off: sealing keys transit here; do not log request body.
    location /internal/crypto/ {
        allow 127.0.0.1;
        allow ::1;
        allow 172.28.0.0/16;
        allow 172.17.0.0/16;
        allow 172.18.0.0/16;
        deny all;

        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Service-Token $http_x_internal_service_token;
        access_log off;
    }

    location /api/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass $web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
