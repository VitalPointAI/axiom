server {
    listen 80;

    # Use Docker's internal DNS resolver so container IP changes are picked
    # up automatically — no more 502s after container restarts.
    resolver 127.0.0.11 valid=5s;

    set $api_upstream http://api:8000;
    set $web_upstream http://web:3000;

    # Auth API routes → FastAPI backend
    location ~ ^/auth/.+ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass $web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
