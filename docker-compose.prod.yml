services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=neartax
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=neartax
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    shm_size: 256mb
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - axiom-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neartax -d neartax"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: indexers/Dockerfile
    command: ["alembic", "-c", "db/migrations/alembic.ini", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql://neartax:${POSTGRES_PASSWORD}@postgres:5432/neartax
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - axiom-net
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  proxy:
    image: nginx:alpine
    ports:
      - "3003:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - axiom-net
    restart: unless-stopped
    labels:
      app.service: proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ${WEB_IMAGE:-axiom-web:local}
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - axiom-net
    restart: unless-stopped
    labels:
      app.service: web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://neartax:${POSTGRES_PASSWORD}@postgres:5432/neartax
      - RP_ID=${RP_ID:-localhost}
      - RP_NAME=${RP_NAME:-Axiom}
      - ORIGIN=${ORIGIN:-http://localhost:3003}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SES_REGION=${AWS_SES_REGION:-ca-central-1}
      - SES_FROM_EMAIL=${AWS_SES_FROM_EMAIL:-axiom@vitalpoint.ai}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3003}
      - SESSION_SECURE=${SESSION_SECURE:-true}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - axiom-net
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      app.service: api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  indexer:
    build:
      context: .
      dockerfile: indexers/Dockerfile
    command: ["python", "-m", "indexers.service", "--streaming"]
    environment:
      - DATABASE_URL=postgresql://neartax:${POSTGRES_PASSWORD}@postgres:5432/neartax
      - NEARBLOCKS_API_KEY=${NEARBLOCKS_API_KEY}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      - CRYPTOCOMPARE_API_KEY=${CRYPTOCOMPARE_API_KEY}
      - FASTNEAR_API_KEY=${FASTNEAR_API_KEY}
      - JOB_POLL_INTERVAL=${JOB_POLL_INTERVAL:-5}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - axiom-net
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    labels:
      app.service: indexer
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  account-indexer:
    build:
      context: .
      dockerfile: indexers/Dockerfile
    command: ["python", "-m", "indexers.account_indexer"]
    environment:
      - DATABASE_URL=postgresql://neartax:${POSTGRES_PASSWORD}@postgres:5432/neartax
      - FASTNEAR_API_KEY=${FASTNEAR_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - axiom-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "indexers.account_indexer_health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    labels:
      app.service: account-indexer
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  axiom-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
