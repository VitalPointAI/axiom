<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom Tax Report — {{ report_title }}</title>
  <style>
    /* Paged media for WeasyPrint */
    @page {
      size: A4;
      margin: 1.5cm;
      @top-left {
        content: "Axiom Tax Report — {{ report_title }}";
        font-family: Arial, Helvetica, sans-serif;
        font-size: 9pt;
        color: #555;
      }
      @top-right {
        content: "{{ tax_year }}";
        font-family: Arial, Helvetica, sans-serif;
        font-size: 9pt;
        color: #555;
      }
      @bottom-center {
        content: "Page " counter(page) " of " counter(pages);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 9pt;
        color: #555;
      }
    }

    /* Reset and base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10pt;
      line-height: 1.4;
      color: #222;
    }

    /* Header */
    .report-header {
      border-bottom: 2px solid #333;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .report-header h1 {
      font-size: 16pt;
      font-weight: bold;
      color: #111;
    }

    .report-header .subtitle {
      font-size: 10pt;
      color: #555;
      margin-top: 4px;
    }

    /* Section headings */
    h2 {
      font-size: 12pt;
      font-weight: bold;
      margin-top: 18px;
      margin-bottom: 8px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 3px;
    }

    h3 {
      font-size: 10pt;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 6px;
    }

    /* Summary box */
    .summary-box {
      border: 1px solid #ccc;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 10pt;
    }

    .summary-row.total {
      border-top: 1px solid #aaa;
      margin-top: 4px;
      padding-top: 4px;
      font-weight: bold;
    }

    .summary-row.highlight {
      font-weight: bold;
      color: #111;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 8.5pt;
      margin-bottom: 12px;
    }

    thead th {
      background-color: #f0f0f0;
      border: 1px solid #bbb;
      padding: 4px 6px;
      text-align: left;
      font-weight: bold;
    }

    thead th.num {
      text-align: right;
    }

    tbody tr:nth-child(even) {
      background-color: #f8f8f8;
    }

    tbody td {
      border: 1px solid #ddd;
      padding: 3px 6px;
    }

    tbody td.num {
      text-align: right;
    }

    tfoot td {
      border: 1px solid #bbb;
      padding: 4px 6px;
      font-weight: bold;
      background-color: #f0f0f0;
    }

    tfoot td.num {
      text-align: right;
    }

    /* Row highlights */
    .row-superficial {
      background-color: #fffbcc !important;
    }

    /* Footnote / alert bars */
    .alert-bar {
      border: 1px solid #cc3300;
      padding: 6px 10px;
      margin-bottom: 12px;
      font-size: 9pt;
      color: #cc3300;
    }

    .info-bar {
      border: 1px solid #555;
      padding: 6px 10px;
      margin-bottom: 12px;
      font-size: 9pt;
      color: #444;
    }

    /* Page break */
    .page-break {
      page-break-after: always;
    }

    /* Footer (rendered via CSS @page, not HTML) */
  </style>
</head>
<body>

  <div class="report-header">
    <h1>{{ report_title }}</h1>
    <div class="subtitle">Tax Year: {{ tax_year }}{% if generated_date %} &nbsp;&nbsp;|&nbsp;&nbsp; Generated: {{ generated_date }}{% endif %}</div>
  </div>

  {% block content %}{% endblock %}

</body>
</html>
