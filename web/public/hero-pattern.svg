<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tileable isometric dot grid pattern -->
  <!-- Rendered at 5-10% opacity as a background texture -->
  <defs>
    <pattern id="iso-grid" x="0" y="0" width="40" height="46" patternUnits="userSpaceOnUse">
      <!-- Row 1: dots at isometric positions -->
      <circle cx="0" cy="0" r="1" fill="white" />
      <circle cx="40" cy="0" r="1" fill="white" />
      <circle cx="20" cy="0" r="1" fill="white" />

      <!-- Row 2: offset dots -->
      <circle cx="10" cy="11.5" r="1" fill="white" />
      <circle cx="30" cy="11.5" r="1" fill="white" />

      <!-- Row 3 -->
      <circle cx="0" cy="23" r="1" fill="white" />
      <circle cx="20" cy="23" r="1" fill="white" />
      <circle cx="40" cy="23" r="1" fill="white" />

      <!-- Row 4: offset -->
      <circle cx="10" cy="34.5" r="1" fill="white" />
      <circle cx="30" cy="34.5" r="1" fill="white" />

      <!-- Connecting lines (very thin) -->
      <!-- Horizontal-ish connections -->
      <line x1="0" y1="0" x2="20" y2="0" stroke="white" stroke-width="0.3" />
      <line x1="20" y1="0" x2="40" y2="0" stroke="white" stroke-width="0.3" />

      <!-- Diagonal connections row 1→2 -->
      <line x1="0" y1="0" x2="10" y2="11.5" stroke="white" stroke-width="0.3" />
      <line x1="20" y1="0" x2="10" y2="11.5" stroke="white" stroke-width="0.3" />
      <line x1="20" y1="0" x2="30" y2="11.5" stroke="white" stroke-width="0.3" />
      <line x1="40" y1="0" x2="30" y2="11.5" stroke="white" stroke-width="0.3" />

      <!-- Diagonal connections row 2→3 -->
      <line x1="10" y1="11.5" x2="0" y2="23" stroke="white" stroke-width="0.3" />
      <line x1="10" y1="11.5" x2="20" y2="23" stroke="white" stroke-width="0.3" />
      <line x1="30" y1="11.5" x2="20" y2="23" stroke="white" stroke-width="0.3" />
      <line x1="30" y1="11.5" x2="40" y2="23" stroke="white" stroke-width="0.3" />

      <!-- Diagonal connections row 3→4 -->
      <line x1="0" y1="23" x2="10" y2="34.5" stroke="white" stroke-width="0.3" />
      <line x1="20" y1="23" x2="10" y2="34.5" stroke="white" stroke-width="0.3" />
      <line x1="20" y1="23" x2="30" y2="34.5" stroke="white" stroke-width="0.3" />
      <line x1="40" y1="23" x2="30" y2="34.5" stroke="white" stroke-width="0.3" />
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#iso-grid)" />
</svg>
