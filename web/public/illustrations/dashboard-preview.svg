<svg viewBox="0 0 560 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dashboard preview/mockup illustration for hero section -->

  <!-- Window chrome -->
  <rect x="0" y="0" width="560" height="340" rx="10" fill="#e2e8f0" opacity="0.10" stroke="#6366f1" stroke-width="1" opacity="0.2" />

  <!-- Title bar -->
  <rect x="0" y="0" width="560" height="30" rx="10" fill="#6366f1" opacity="0.18" />
  <rect x="0" y="20" width="560" height="10" fill="#6366f1" opacity="0.18" />

  <!-- Window dots -->
  <circle cx="16" cy="15" r="4" fill="#ef4444" opacity="0.4" />
  <circle cx="30" cy="15" r="4" fill="#eab308" opacity="0.4" />
  <circle cx="44" cy="15" r="4" fill="#22c55e" opacity="0.4" />

  <!-- Sidebar -->
  <rect x="0" y="30" width="120" height="310" fill="#e2e8f0" opacity="0.10" />
  <line x1="120" y1="30" x2="120" y2="340" stroke="#e2e8f0" stroke-width="0.5" opacity="0.18" />

  <!-- Sidebar items -->
  <rect x="16" y="50" width="88" height="8" rx="3" fill="#6366f1" opacity="0.15" />
  <rect x="16" y="72" width="70" height="6" rx="3" fill="#e2e8f0" opacity="0.15" />
  <rect x="16" y="90" width="80" height="6" rx="3" fill="#e2e8f0" opacity="0.15" />
  <rect x="16" y="108" width="60" height="6" rx="3" fill="#e2e8f0" opacity="0.15" />
  <rect x="16" y="126" width="75" height="6" rx="3" fill="#e2e8f0" opacity="0.15" />
  <rect x="16" y="144" width="65" height="6" rx="3" fill="#e2e8f0" opacity="0.15" />

  <!-- Main content area -->
  <!-- Header metrics row -->
  <g transform="translate(140, 46)">
    <!-- Metric card 1 -->
    <rect x="0" y="0" width="120" height="60" rx="6" fill="#e2e8f0" opacity="0.10" stroke="#e2e8f0" stroke-width="0.5" opacity="0.18" />
    <rect x="12" y="12" width="50" height="4" rx="2" fill="#e2e8f0" opacity="0.1" />
    <rect x="12" y="28" width="70" height="8" rx="3" fill="#10b981" opacity="0.3" />
    <rect x="12" y="44" width="40" height="3" rx="1.5" fill="#e2e8f0" opacity="0.15" />

    <!-- Metric card 2 -->
    <rect x="132" y="0" width="120" height="60" rx="6" fill="#e2e8f0" opacity="0.10" stroke="#e2e8f0" stroke-width="0.5" opacity="0.18" />
    <rect x="144" y="12" width="50" height="4" rx="2" fill="#e2e8f0" opacity="0.1" />
    <rect x="144" y="28" width="60" height="8" rx="3" fill="#6366f1" opacity="0.3" />
    <rect x="144" y="44" width="35" height="3" rx="1.5" fill="#e2e8f0" opacity="0.15" />

    <!-- Metric card 3 -->
    <rect x="264" y="0" width="120" height="60" rx="6" fill="#e2e8f0" opacity="0.10" stroke="#e2e8f0" stroke-width="0.5" opacity="0.18" />
    <rect x="276" y="12" width="55" height="4" rx="2" fill="#e2e8f0" opacity="0.1" />
    <rect x="276" y="28" width="65" height="8" rx="3" fill="#8b5cf6" opacity="0.3" />
    <rect x="276" y="44" width="45" height="3" rx="1.5" fill="#e2e8f0" opacity="0.15" />
  </g>

  <!-- Chart area -->
  <g transform="translate(140, 126)">
    <rect x="0" y="0" width="395" height="140" rx="6" fill="#e2e8f0" opacity="0.18" stroke="#e2e8f0" stroke-width="0.5" opacity="0.18" />

    <!-- Chart title -->
    <rect x="12" y="12" width="80" height="5" rx="2" fill="#e2e8f0" opacity="0.12" />

    <!-- Grid lines -->
    <line x1="12" y1="40" x2="383" y2="40" stroke="#e2e8f0" stroke-width="0.3" opacity="0.15" />
    <line x1="12" y1="65" x2="383" y2="65" stroke="#e2e8f0" stroke-width="0.3" opacity="0.15" />
    <line x1="12" y1="90" x2="383" y2="90" stroke="#e2e8f0" stroke-width="0.3" opacity="0.15" />
    <line x1="12" y1="115" x2="383" y2="115" stroke="#e2e8f0" stroke-width="0.3" opacity="0.15" />

    <!-- Chart line -->
    <polyline points="30,100 70,85 110,90 150,60 190,70 230,50 270,55 310,40 350,48 375,42"
      stroke="#6366f1" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Area fill under line -->
    <polygon points="30,100 70,85 110,90 150,60 190,70 230,50 270,55 310,40 350,48 375,42 375,125 30,125"
      fill="#6366f1" opacity="0.15" />

    <!-- Data dots -->
    <circle cx="150" cy="60" r="3" fill="#6366f1" opacity="0.6" />
    <circle cx="270" cy="55" r="3" fill="#6366f1" opacity="0.6" />
    <circle cx="375" cy="42" r="3" fill="#06b6d4" opacity="0.7" />
  </g>

  <!-- Bottom table rows -->
  <g transform="translate(140, 280)">
    <rect x="0" y="0" width="395" height="44" rx="6" fill="#e2e8f0" opacity="0.18" stroke="#e2e8f0" stroke-width="0.5" opacity="0.18" />
    <rect x="12" y="10" width="60" height="4" rx="2" fill="#e2e8f0" opacity="0.18" />
    <rect x="100" y="10" width="40" height="4" rx="2" fill="#e2e8f0" opacity="0.15" />
    <rect x="200" y="10" width="50" height="4" rx="2" fill="#10b981" opacity="0.2" />
    <rect x="310" y="10" width="60" height="4" rx="2" fill="#e2e8f0" opacity="0.15" />

    <rect x="12" y="26" width="55" height="4" rx="2" fill="#e2e8f0" opacity="0.18" />
    <rect x="100" y="26" width="35" height="4" rx="2" fill="#e2e8f0" opacity="0.15" />
    <rect x="200" y="26" width="45" height="4" rx="2" fill="#ef4444" opacity="0.15" />
    <rect x="310" y="26" width="55" height="4" rx="2" fill="#e2e8f0" opacity="0.15" />
  </g>
</svg>
