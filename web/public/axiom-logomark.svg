<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Axiom logomark: Convergence Node
    Three data streams flow inward to a central point of truth.
  -->

  <!-- Three converging streams (solid color, no fade) -->
  <!-- Top stream: cyan, flows down to center -->
  <line x1="32" y1="2" x2="32" y2="24" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" />

  <!-- Bottom-left stream: indigo, flows up-right to center -->
  <line x1="7" y1="54" x2="26" y2="36" stroke="#6366f1" stroke-width="6" stroke-linecap="round" />

  <!-- Bottom-right stream: purple, flows up-left to center -->
  <line x1="57" y1="54" x2="38" y2="36" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" />

  <!-- Central convergence node -->
  <circle cx="32" cy="31" r="9" fill="#6366f1" />
  <circle cx="32" cy="31" r="9" fill="#8b5cf6" opacity="0.4" />
  <circle cx="32" cy="31" r="4.5" fill="white" opacity="0.95" />
</svg>
