<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Axiom logomark: Convergence Node
    Three data streams flow inward to a central point of truth.
    Represents multiple blockchains/sources converging into one
    accurate tax calculation.

    Top stream    = cyan    (clarity / the result)
    Left stream   = indigo  (compliance / CRA)
    Right stream  = purple  (blockchain-native / DeFi)
    Center node   = white   (the axiom / truth)
  -->
  <defs>
    <linearGradient id="stream-top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="stream-left" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="stream-right" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Three converging streams (rounded strokes, tapered via gradient) -->
  <!-- Top stream: flows down to center -->
  <line x1="32" y1="4" x2="32" y2="28" stroke="url(#stream-top)" stroke-width="5" stroke-linecap="round" />

  <!-- Bottom-left stream: flows up-right to center -->
  <line x1="8" y1="52" x2="28" y2="34" stroke="url(#stream-left)" stroke-width="5" stroke-linecap="round" />

  <!-- Bottom-right stream: flows up-left to center -->
  <line x1="56" y1="52" x2="36" y2="34" stroke="url(#stream-right)" stroke-width="5" stroke-linecap="round" />

  <!-- Source nodes (small dots at the origin of each stream) -->
  <circle cx="32" cy="4" r="3" fill="#06b6d4" opacity="0.5" />
  <circle cx="8" cy="52" r="3" fill="#6366f1" opacity="0.5" />
  <circle cx="56" cy="52" r="3" fill="#8b5cf6" opacity="0.5" />

  <!-- Central convergence node (the axiom / truth) -->
  <circle cx="32" cy="32" r="8" fill="#6366f1" />
  <circle cx="32" cy="32" r="8" fill="url(#stream-right)" opacity="0.5" />
  <circle cx="32" cy="32" r="4" fill="white" opacity="0.9" />

  <!-- Subtle outer glow -->
  <circle cx="32" cy="32" r="12" fill="#6366f1" opacity="0.08" />
</svg>
