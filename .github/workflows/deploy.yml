name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI Quality Gates"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Commit SHA to rollback to (leave empty for normal deploy)"
        required: false
        default: ""

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # Step 1: Detect what changed to determine which images to build
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      web: ${{ steps.filter.outputs.web }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "force-all")
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE '^(web/|package|Dockerfile)' || echo "$CHANGED" | grep -q "force-all"; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^(api/|indexers/|engine/|verify/|db/|config\.py|requirements)' || echo "$CHANGED" | grep -q "force-all"; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

  # Step 2: Build web image on GitHub runners (fast) — only if web changed
  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/web" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

  # Step 3: Deploy to server
  deploy:
    needs: [changes, build-web]
    if: always() && (needs.changes.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Compute web image tag
        id: webimg
        run: echo "tag=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/web:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Create .env on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEARBLOCKS_API_KEY: ${{ secrets.NEARBLOCKS_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
          FASTNEAR_API_KEY: ${{ secrets.FASTNEAR_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          NEAR_AI_API_KEY: ${{ secrets.NEAR_AI_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          # Phase 16 post-quantum encryption secrets
          EMAIL_HMAC_KEY: ${{ secrets.EMAIL_HMAC_KEY }}
          NEAR_ACCOUNT_HMAC_KEY: ${{ secrets.NEAR_ACCOUNT_HMAC_KEY }}
          TX_DEDUP_KEY: ${{ secrets.TX_DEDUP_KEY }}
          ACB_DEDUP_KEY: ${{ secrets.ACB_DEDUP_KEY }}
          SESSION_DEK_WRAP_KEY: ${{ secrets.SESSION_DEK_WRAP_KEY }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          WEB_IMAGE: ${{ steps.webimg.outputs.tag }}
        run: |
          ENV_CONTENT="POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql://neartax:${POSTGRES_PASSWORD}@postgres:5432/neartax
          NEARBLOCKS_API_KEY=${NEARBLOCKS_API_KEY}
          ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
          ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY}
          COINGECKO_API_KEY=${COINGECKO_API_KEY}
          CRYPTOCOMPARE_API_KEY=${CRYPTOCOMPARE_API_KEY}
          FASTNEAR_API_KEY=${FASTNEAR_API_KEY}
          JOB_POLL_INTERVAL=5
          SYNC_INTERVAL_MINUTES=15
          NODE_ENV=production
          NEXT_PUBLIC_APP_URL=https://axiom.vitalpoint.ai
          NEXT_PUBLIC_API_URL=
          RP_ID=axiom.vitalpoint.ai
          RP_NAME=Axiom
          ORIGIN=https://axiom.vitalpoint.ai
          ALLOWED_ORIGINS=https://axiom.vitalpoint.ai
          SESSION_SECURE=true
          SECRET_KEY=${SECRET_KEY}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_SES_REGION=ca-central-1
          AWS_SES_FROM_EMAIL=axiom@vitalpoint.ai
          NEAR_AI_API_KEY=${NEAR_AI_API_KEY}
          NEAR_NETWORK=mainnet
          EMAIL_HMAC_KEY=${EMAIL_HMAC_KEY}
          NEAR_ACCOUNT_HMAC_KEY=${NEAR_ACCOUNT_HMAC_KEY}
          TX_DEDUP_KEY=${TX_DEDUP_KEY}
          ACB_DEDUP_KEY=${ACB_DEDUP_KEY}
          SESSION_DEK_WRAP_KEY=${SESSION_DEK_WRAP_KEY}
          INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
          WEB_IMAGE=${WEB_IMAGE}"
          echo "$ENV_CONTENT" | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} "cat > ${DEPLOY_PATH}/.env"

      - name: Docker prune on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "docker image prune -af --filter 'until=72h' && docker builder prune -af --filter 'until=72h'" || true

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ~/.ssh/deploy_key
          BUILD_WEB: ${{ needs.changes.outputs.web }}
          BUILD_BACKEND: ${{ needs.changes.outputs.backend }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ROLLBACK_SHA="${{ github.event.inputs.rollback_sha }}"
          if [[ -n "$ROLLBACK_SHA" ]]; then
            bash scripts/deploy.sh --rollback "$ROLLBACK_SHA"
          else
            bash scripts/deploy.sh
          fi

      - name: Show logs on failure
        if: failure()
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "cd ${DEPLOY_PATH} && docker compose -f docker-compose.prod.yml logs --tail=50" || true

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
