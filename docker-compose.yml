version: '3.8'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgres://neartax:${POSTGRES_PASSWORD}@postgres:5432/neartax
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  indexer:
    build:
      context: ./indexers
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://neartax:${POSTGRES_PASSWORD}@postgres:5432/neartax
      - NEARBLOCKS_API_KEY=${NEARBLOCKS_API_KEY}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Runs cron internally for scheduled indexing

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=neartax
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=neartax
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"  # Only expose locally
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neartax -d neartax"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
