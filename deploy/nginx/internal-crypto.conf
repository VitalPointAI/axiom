# deploy/nginx/internal-crypto.conf
#
# nginx ACL for /internal/crypto/* endpoints (Phase 16, D-27, T-16-10).
#
# These endpoints expose ML-KEM-768 key operations and must NEVER be accessible
# from the public internet. Access is restricted to:
#   1. The loopback address (127.0.0.1) — for direct local calls
#   2. Docker bridge network range — for auth-service container calls
#
# Security notes:
#   - access_log off: request bodies transit here during enable/revoke; do NOT log.
#   - X-Internal-Service-Token is forwarded to FastAPI for application-layer auth.
#   - This config provides defense-in-depth. The FastAPI router also enforces:
#       (a) X-Internal-Service-Token header check (T-16-10)
#       (b) Loopback IP check when AXIOM_ENV=production (T-16-10)
#
# Integration:
#   Include this file in the nginx server block, BEFORE the catch-all /api/ block:
#
#       include /etc/nginx/conf.d/internal-crypto.conf;
#
#   Or copy-paste the location block into nginx/default.conf server{} context.
#
# Docker network: The default bridge subnet is 172.17.0.0/16. The Axiom compose
# file pins a /16 at 172.28.0.0/16. Adjust the allow directive to match your
# actual docker-compose network subnet.

location /internal/crypto/ {
    # Allow loopback (same host)
    allow 127.0.0.1;
    allow ::1;

    # Allow Docker bridge networks (auth-service container)
    # Axiom production compose: 172.28.0.0/16 (see docker-compose.prod.yml ipam)
    allow 172.28.0.0/16;
    # Docker default bridge (dev environments)
    allow 172.17.0.0/16;
    allow 172.18.0.0/16;

    # Deny all other sources — public internet must NEVER reach these endpoints
    deny all;

    proxy_pass http://172.28.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Internal-Service-Token $http_x_internal_service_token;

    # Do NOT log request bodies — sealing_key_hex transits here (T-16-10)
    access_log off;
}
